<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{{{ PRODUCT_NAME }}}</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
</head>

<body class="{{{ SPLASH_SCREEN_STYLE.toLowerCase() }}}">
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas"></canvas>
    </div>
    <div id="loading-cover" style="display:none;">
        <div id="unity-loading-bar">
            <div id="unity-logo"><img src="logo.png"></div>
            <div id="unity-progress-bar-empty" style="display: none;">
                <div id="unity-progress-bar-full"></div>
            </div>
            <div class="spinner"></div>
        </div>
    </div>
    <div id="unity-fullscreen-button" style="display: none;"></div>
    <script src="JavaScripts/jquery-3.7.1.min.js"></script>
    <script src="JavaScripts/webBridge.js"></script>
    <script src="JavaScripts/custom.js"></script>
    #if Use_File_Selector
    <script src="JavaScripts/webFileSelector.js"></script>
    #endif
    #if Use_SocketIO
    <script src="JavaScripts/socket.io.min.js"></script>
    <script src="JavaScripts/webSocketIO.js"></script>
    #endif
    #if Use_MQTT
    <script src="JavaScripts/mqtt.min.js"></script>
    <script src="JavaScripts/webMQTT.js"></script>
    #endif
    #if Use_Iframe
    <script src="JavaScripts/webIframe.js"></script>
    #endif
    #if USE_REMOTE_INPUT
    <script src="JavaScripts/remoteInputUnity.js"></script>
    <script src="JavaScripts/remoteInput.js"></script>
    #endif
    <script>
        const showFullScreenButton = "{{{ SHOW_FULL_SCREEN_BUTTON }}}";
        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
        const config = {
            dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
            frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
            codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
            #if MEMORY_FILENAME
      memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
            #endif
      #if SYMBOLS_FILENAME
      symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
            #endif
      streamingAssetsUrl: "StreamingAssets",
            companyName: "{{{ COMPANY_NAME }}}",
            productName: "{{{ PRODUCT_NAME }}}",
            productVersion: "{{{ PRODUCT_VERSION }}}",
        };

        const container = document.querySelector("#unity-container");
        const canvas = document.querySelector("#unity-canvas");
        const loadingCover = document.querySelector("#loading-cover");
        const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");
        const fullscreenButton = document.querySelector("#unity-fullscreen-button");
        const spinner = document.querySelector('.spinner');
        const canFullscreen = (function ()
        {
            for (const key of [
                'exitFullscreen',
                'webkitExitFullscreen',
                'webkitCancelFullScreen',
                'mozCancelFullScreen',
                'msExitFullscreen',
            ])
            {
                if (key in document)
                {
                    return true;
                }
            }
            return false;
        }());

        var UnityInstance;

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent))
        {
            container.className = "unity-mobile";
            config.devicePixelRatio = 1;
        }
        #if BACKGROUND_FILENAME
        canvas.style.background = "url('" + buildUrl + "/{{{ BACKGROUND_FILENAME.replace(/'/g, '%27') }}}') center / cover";
        #endif
        loadingCover.style.display = "";

        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () =>
        {
            createUnityInstance(canvas, config, (progress) =>
            {
                spinner.style.display = "none";
                progressBarEmpty.style.display = "";
                progressBarFull.style.width = `${100 * progress}%`;
            }).then((unityInstance) =>
            {
                UnityInstance = unityInstance;
                onUnityLoadEnd();
                loadingCover.style.display = "none";
                if (canFullscreen)
                {
                    if (showFullScreenButton)
                    {
                        fullscreenButton.style.display = "";
                    }
                    fullscreenButton.onclick = () =>
                    {
                        unityInstance.SetFullscreen(1);
                    };
                }
            }).catch((message) =>
            {
                alert(message);
            });
            /*接收父窗体发来的消息
                使用: 
                父窗体:
                    获取本iframe的DOM对象并链接:
                    var receiver = document.getElementById('receiver').contentWindow;
                    然后通过posstMessage()方法发送消息给子窗体
                    receiver.postMessage("hello" + val + "!", "*");
                    
                Unity接收:
                    unity的iframe通过监听窗口的message事件获取消息内容,然后通过sendMessageToUnity()将消息发送给Unity
                    sendMessageToUnity()方法在webBridge.js脚本中

                    unity示例:
                        window.onload = function ()
                        {
                        window.addEventListener('message', function (e)
                              {  // 监听 message 事件
                                  //alert(e.origin);
                                console.log(e + "  " + e.data);
                                sendMessageToUnity("FindAlarmMeasurePoint",e.data);
                                });
                            }
                              */




        };
        document.body.appendChild(script);

    </script>
</body>

</html>
